<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nexaris Friend Mode</title>

<style>

/* =========================
   FULL SCREEN FIX
========================= */

html, body{
margin:0;
padding:0;
height:100%;
width:100%;
background:#000;
overflow:hidden;
font-family:Arial;
}

/* MAIN LAYOUT */
#app{
display:flex;
height:100vh;
width:100vw;
}

/* =========================
   SIDEBAR
========================= */

#sidebar{
width:320px;
background:#111;
display:flex;
flex-direction:column;
padding:12px;
gap:10px;
border-right:1px solid #222;
}

#mode{
padding:12px;
background:#222;
border-radius:10px;
text-align:center;
cursor:pointer;
font-size:16px;
}

button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
background:white;
color:black;
font-size:16px;
}

.chatItem{
padding:12px;
background:#222;
border-radius:10px;
cursor:pointer;
font-size:18px;
}

/* =========================
   MAIN CHAT
========================= */

#main{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

/* CHAT AREA FULL FILL */
#chat{
flex:1;
overflow-y:auto;
padding:24px;
display:flex;
flex-direction:column;
gap:16px;

font-size:28px;
line-height:1.7;
}

/* USER MESSAGE */
.user{
align-self:flex-end;
background:#333;
padding:16px;
border-radius:16px;
max-width:75%;
font-size:28px;
}

/* AI MESSAGE */
.ai{
align-self:flex-start;
background:#111;
padding:16px;
border-radius:16px;
max-width:92%;
font-size:28px;
white-space:pre-wrap;
}

/* =========================
   INPUT BAR
========================= */

#inputArea{
display:flex;
gap:10px;
padding:16px;
border-top:1px solid #222;
align-items:center;
}

#input{
flex:1;
padding:18px;
font-size:22px;
background:#111;
color:white;
border:1px solid #333;
border-radius:12px;
}

#imgInput{
display:none;
}

/* IMAGE */
img{
max-width:300px;
border-radius:12px;
margin-top:8px;
}

</style>
</head>

<body>

<div id="app">

<!-- SIDEBAR -->
<div id="sidebar">

<div id="mode" onclick="toggleMode()">Friend Mode 💖</div>

<button onclick="newChat()">+ New Chat</button>

<div id="chatList"></div>

</div>

<!-- MAIN -->
<div id="main">

<div id="chat"></div>

<div id="inputArea">

<button onclick="document.getElementById('imgInput').click()">📷</button>

<input id="input" placeholder="Message Nexaris..." />

<button onclick="send()">Send</button>

<input type="file" id="imgInput" accept="image/*">

</div>

</div>

</div>

<script>

/* =========================
   API KEYS
========================= */

const OPENROUTER_KEY = "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";
const GROQ_KEY = "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";

/* ========================= */

let chats = {};
let currentChat = null;

/* FRIEND MODE DEFAULT */
let mode = "friend"; // friend, smart, fast

/* =========================
   MODE SYSTEM
========================= */

function toggleMode(){

if(mode === "friend") mode = "smart";
else if(mode === "smart") mode = "fast";
else mode = "friend";

document.getElementById("mode").innerText =
mode === "friend" ? "Friend Mode 💖"
: mode === "smart" ? "Smart Mode 🧠"
: "Fast Mode ⚡";

}

/* =========================
   CHAT SYSTEM
========================= */

function newChat(){

const id = "Chat " + (Object.keys(chats).length + 1);

chats[id] = [];
currentChat = id;

renderChats();
renderChat();

}

/* RENAME */
function renameChat(oldName){

const newName = prompt("Rename chat:");
if(!newName) return;

chats[newName] = chats[oldName];
delete chats[oldName];

currentChat = newName;

renderChats();
renderChat();

}

/* =========================
   SIDEBAR
========================= */

function renderChats(){

const list = document.getElementById("chatList");
list.innerHTML = "";

Object.keys(chats).forEach(id=>{

const div = document.createElement("div");
div.className = "chatItem";
div.textContent = id;

div.onclick = ()=>{
currentChat = id;
renderChat();
};

div.ondblclick = ()=>{
renameChat(id);
};

list.appendChild(div);

});

}

/* =========================
   CHAT RENDER (FIXED FULL MEMORY)
========================= */

function renderChat(){

const chat = document.getElementById("chat");
chat.innerHTML = "";

if(!chats[currentChat]){
chats[currentChat] = [];
}

for(const m of chats[currentChat]){

const div = document.createElement("div");
div.className = m.role;

if(m.type === "image"){

const img = document.createElement("img");
img.src = m.text;
div.appendChild(img);

}else{

div.textContent = m.text;

}

chat.appendChild(div);

}

chat.scrollTop = chat.scrollHeight;

}

/* =========================
   FRIEND MODE PROMPT
========================= */

function buildPrompt(messages){

if(mode !== "friend") return messages;

return [
{
role:"system",
content:
"You are Nexaris in FRIEND MODE. " +
"Talk naturally like a warm, friendly assistant. " +
"Use light emojis occasionally. " +
"Keep responses human, relaxed, and easy to read."
},
...messages
];

}

/* =========================
   OPENROUTER
========================= */

async function openRouterChat(messages){

const model =
mode === "fast"
? "mistralai/mistral-7b-instruct:free"
: "deepseek/deepseek-chat-v3-0324:free";

const res = await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + OPENROUTER_KEY,
"HTTP-Referer":"https://nexaris.local",
"X-Title":"Nexaris"
},
body:JSON.stringify({
model:model,
messages:buildPrompt(messages)
})
}
);

const data = await res.json();

if(data.error){
return { success:false, reason:data.error.message };
}

const text =
data?.choices?.[0]?.message?.content;

return text
? { success:true, text }
: { success:false, reason:"OpenRouter empty response" };

}

/* =========================
   GROQ FALLBACK
========================= */

async function groqChat(messages){

const res = await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + GROQ_KEY
},
body:JSON.stringify({
model:"llama-3.1-8b-instant",
messages:buildPrompt(messages)
})
}
);

const data = await res.json();

if(data.error){
return { success:false, reason:data.error.message };
}

const text =
data?.choices?.[0]?.message?.content;

return text
? { success:true, text }
: { success:false, reason:"Groq empty response" };

}

/* =========================
   SEND
========================= */

async function send(){

const input = document.getElementById("input");
const text = input.value.trim();

if(!text) return;

input.value = "";

if(!chats[currentChat]){
chats[currentChat] = [];
}

chats[currentChat].push({
role:"user",
text
});

renderChat();

const messages = chats[currentChat].map(m=>({
role:m.role,
content:m.text
}));

addMsg("ai","Thinking...");

let result = await openRouterChat(messages);

if(!result.success){
result = await groqChat(messages);
}

chat.lastChild.remove();

addMsg(
"ai",
result.success ? result.text : "❌ FAILED\n\n" + result.reason
);

}

/* =========================
   ADD MESSAGE
========================= */

function addMsg(role,text){

const chat = document.getElementById("chat");

const div = document.createElement("div");
div.className = role;
div.textContent = text;

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;

}

/* =========================
   IMAGE UPLOAD
========================= */

document.getElementById("imgInput")
.addEventListener("change",function(e){

const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(evt){

if(!chats[currentChat]){
chats[currentChat] = [];
}

chats[currentChat].push({
role:"user",
type:"image",
text:evt.target.result
});

renderChat();

};

reader.readAsDataURL(file);

});

/* ENTER */
document.getElementById("input")
.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

/* START */
newChat();

</script>

</body>
</html>
