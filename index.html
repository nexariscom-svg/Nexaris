<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nexaris Final</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
font-family:Arial;
overflow:hidden;
}

/* APP */
#app{
display:flex;
width:100vw;
height:100vh;
}

/* SIDEBAR */
#sidebar{
width:320px;
background:#111;
display:flex;
flex-direction:column;
padding:12px;
gap:10px;
border-right:1px solid #222;
overflow-y:auto;
}

/* MODE BUTTON */
#mode{
padding:12px;
background:#222;
border-radius:10px;
text-align:center;
cursor:pointer;
font-size:16px;
color:white;
}

/* BUTTON */
button{
padding:12px;
font-size:15px;
border:none;
border-radius:10px;
cursor:pointer;
background:white;
color:black;
}

/* CHAT ITEMS */
.chatItem{
padding:12px;
background:#222;
border-radius:10px;
cursor:pointer;
font-size:16px;
color:white;
}

/* PERSONALIZATION SECTION */
.sectionTitle{
margin-top:10px;
font-size:13px;
color:#aaa;
}

#personaBox{
width:100%;
height:140px;
background:#222;
color:white;
border:none;
border-radius:10px;
padding:10px;
font-size:13px;
resize:none;
outline:none;
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

/* CHAT */
#chat{
flex:1;
overflow-y:auto;
padding:24px;
display:flex;
flex-direction:column;
gap:16px;
font-size:26px;
line-height:1.6;
}

/* USER */
.user{
align-self:flex-end;
background:#333;
padding:14px;
border-radius:14px;
max-width:75%;
}

/* AI */
.ai{
align-self:flex-start;
background:#111;
padding:14px;
border-radius:14px;
max-width:92%;
white-space:pre-wrap;
}

/* INPUT */
#inputArea{
display:flex;
gap:10px;
padding:14px;
border-top:1px solid #222;
align-items:center;
}

#input{
flex:1;
padding:16px;
font-size:18px;
background:#111;
color:white;
border:1px solid #333;
border-radius:10px;
}

img{
max-width:300px;
border-radius:12px;
margin-top:8px;
}

#imgInput{
display:none;
}

</style>
</head>

<body>

<div id="app">

<!-- SIDEBAR -->
<div id="sidebar">

<div id="mode" onclick="toggleMode()">Friend Mode 💖</div>

<button onclick="newChat()">+ New Chat</button>

<div id="chatList"></div>

<div class="sectionTitle">Personalization 🧠</div>

<textarea id="personaBox"
placeholder="Example:
Name: Nova 🌙
Be friendly, use emojis, talk like a calm assistant.

User: hi
Assistant: hey 🙂 how are you?"></textarea>

</div>

<!-- MAIN -->
<div id="main">

<div id="chat"></div>

<div id="inputArea">

<button onclick="document.getElementById('imgInput').click()">📷</button>

<input id="input" placeholder="Message Nexaris..." />

<button onclick="send()">Send</button>

<input type="file" id="imgInput" accept="image/*">

</div>

</div>

</div>

<script>

/* =========================
   KEYS
========================= */

const OPENROUTER_KEY = "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";
const GROQ_KEY = "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";

/* ========================= */

let chats = {};
let currentChat = null;
let mode = "friend";

/* =========================
   MODE
========================= */

function toggleMode(){

if(mode==="friend") mode="smart";
else if(mode==="smart") mode="fast";
else mode="friend";

document.getElementById("mode").innerText =
mode==="friend"?"Friend Mode 💖":
mode==="smart"?"Smart Mode 🧠":
"Fast Mode ⚡";

}

/* =========================
   CHAT SYSTEM
========================= */

function newChat(){

const id = "Chat " + (Object.keys(chats).length + 1);

chats[id] = [];
currentChat = id;

renderChats();
renderChat();

save();

}

/* RENAME */
function renameChat(oldName){

const n = prompt("Rename chat:");
if(!n) return;

chats[n] = chats[oldName];
delete chats[oldName];

currentChat = n;

renderChats();
renderChat();

save();

}

/* =========================
   SAVE
========================= */

function save(){
localStorage.setItem("nexaris_chats",JSON.stringify(chats));
localStorage.setItem("nexaris_mode",mode);
localStorage.setItem("nexaris_persona",
document.getElementById("personaBox").value || ""
);
}

function load(){
chats = JSON.parse(localStorage.getItem("nexaris_chats")||"{}");
mode = localStorage.getItem("nexaris_mode")||"friend";

document.getElementById("personaBox").value =
localStorage.getItem("nexaris_persona") || "";
}

/* =========================
   PERSONA
========================= */

function getPersona(){
return document.getElementById("personaBox").value || "";
}

/* =========================
   PROMPT
========================= */

function buildPrompt(messages){

let persona = getPersona();

let system =
"Core rules: " +
"- Always use light emojis 🙂✨ " +
"- Be friendly and conversational " +
"- Follow user persona strictly ";

if(persona.trim()){
system += "\n\nPersona:\n" + persona;
}

return [
{role:"system",content:system},
...messages
];

}

/* =========================
   OPENROUTER
========================= */

async function openRouterChat(messages){

const model =
mode==="fast"
?"mistralai/mistral-7b-instruct:free"
:"deepseek/deepseek-chat-v3-0324:free";

const res = await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+OPENROUTER_KEY,
"HTTP-Referer":"https://nexaris.local",
"X-Title":"Nexaris"
},
body:JSON.stringify({
model,
messages:buildPrompt(messages)
})
}
);

const data = await res.json();

if(data.error)return{success:false,reason:data.error.message};

const text = data?.choices?.[0]?.message?.content;

return text?
{success:true,text}:{success:false,reason:"empty"};

}

/* =========================
   GROQ
========================= */

async function groqChat(messages){

const res = await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+GROQ_KEY
},
body:JSON.stringify({
model:"llama-3.1-8b-instant",
messages:buildPrompt(messages)
})
}
);

const data = await res.json();

if(data.error)return{success:false,reason:data.error.message};

const text = data?.choices?.[0]?.message?.content;

return text?
{success:true,text}:{success:false,reason:"empty"};

}

/* =========================
   SEND
========================= */

async function send(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text)return;

input.value="";

if(!chats[currentChat])chats[currentChat]=[];

chats[currentChat].push({role:"user",text});
renderChat();
save();

const msgs=chats[currentChat].map(m=>({
role:m.role,
content:m.text
}));

add("ai","Thinking...");

let r=await openRouterChat(msgs);

if(!r.success)r=await groqChat(msgs);

chat.lastChild.remove();

add("ai",r.success?r.text:"❌ FAILED\n\n"+r.reason);

}

/* =========================
   RENDER
========================= */

function renderChat(){

const chat=document.getElementById("chat");
chat.innerHTML="";

if(!chats[currentChat])chats[currentChat]=[];

for(const m of chats[currentChat]){

const d=document.createElement("div");
d.className=m.role;

if(m.type==="image"){

const img=document.createElement("img");
img.src=m.text;
d.appendChild(img);

}else d.textContent=m.text;

chat.appendChild(d);

}

chat.scrollTop=chat.scrollHeight;

}

/* =========================
   SIDEBAR
========================= */

function renderChats(){

const list=document.getElementById("chatList");
list.innerHTML="";

Object.keys(chats).forEach(id=>{

const d=document.createElement("div");
d.className="chatItem";
d.textContent=id;

d.onclick=()=>{currentChat=id;renderChat();};
d.ondblclick=()=>renameChat(id);

list.appendChild(d);

});

}

/* =========================
   IMAGE
========================= */

document.getElementById("imgInput")
.addEventListener("change",e=>{

const f=e.target.files[0];
if(!f)return;

const r=new FileReader();

r.onload=ev=>{

if(!chats[currentChat])chats[currentChat]=[];

chats[currentChat].push({
role:"user",
type:"image",
text:ev.target.result
});

renderChat();
save();

};

r.readAsDataURL(f);

});

/* ENTER */
document.getElementById("input")
.addEventListener("keydown",e=>{
if(e.key==="Enter")send();
});

/* ADD MSG */
function add(role,text){

const chat=document.getElementById("chat");

const d=document.createElement("div");
d.className=role;
d.textContent=text;

chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;

}

/* INIT */
load();

if(Object.keys(chats).length===0)newChat();
else{
currentChat=Object.keys(chats)[0];
renderChats();
renderChat();
}

</script>

</body>
</html>
