<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.user{
align-self:flex-end;
background:#333;
padding:10px;
border-radius:12px;
max-width:75%;
}

.ai{
align-self:flex-start;
white-space:pre-wrap;
max-width:90%;
}

#inputArea{
display:flex;
padding:10px;
gap:10px;
border-top:1px solid #222;
}

#input{
flex:1;
padding:12px;
background:#111;
color:white;
border:1px solid #333;
border-radius:10px;
}

#sendBtn{
padding:12px;
border:none;
border-radius:10px;
background:white;
color:black;
cursor:pointer;
}

</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">

<input
id="input"
placeholder="Message Nexaris..."
/>

<button id="sendBtn">
Send
</button>

</div>

<script>

const BACKEND_URL =
"https://PASTE_RENDER_URL_HERE/chat";

const chat =
document.getElementById(
"chat"
);

const input =
document.getElementById(
"input"
);

const sendBtn =
document.getElementById(
"sendBtn"
);

let messages = [];

function renderMessage(role,text){

const div =
document.createElement(
"div"
);

div.className =
role;

div.textContent =
text;

chat.appendChild(div);

chat.scrollTop =
chat.scrollHeight;

}

async function send(){

const text =
input.value.trim();

if(!text) return;

input.value = "";

messages.push({

role:"user",
content:text

});

renderMessage(
"user",
text
);

try{

const response =
await fetch(
BACKEND_URL,
{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({

messages

})

}
);

const data =
await response.json();

const reply =

data?.choices?.[0]
?.message?.content

||

"AI failed.";

messages.push({

role:"assistant",
content:reply

});

renderMessage(
"ai",
reply
);

}catch(err){

renderMessage(
"ai",
"Connection error."
);

}

}

sendBtn.addEventListener(
"click",
send
);

input.addEventListener(
"keydown",
(e)=>{

if(e.key==="Enter"){

send();

}

}
);

</script>

</body>
</html>
