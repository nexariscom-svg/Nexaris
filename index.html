<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nexaris</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
display:flex;
height:100vh;
}

#sidebar{
width:230px;
background:#111;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
border-right:1px solid #222;
}

.chatItem{
padding:8px;
background:#222;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

.chatItem:hover{
background:#333;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.user{
align-self:flex-end;
background:#333;
padding:10px;
border-radius:10px;
max-width:70%;
}

.ai{
align-self:flex-start;
padding:10px;
max-width:90%;
white-space:pre-wrap;
}

#inputArea{
display:flex;
padding:10px;
gap:10px;
border-top:1px solid #222;
}

#input{
flex:1;
padding:10px;
background:#111;
border:1px solid #333;
color:white;
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

#send{background:white;color:black;}
#imgBtn{background:#222;color:white;}

img{
max-width:220px;
margin-top:5px;
border-radius:10px;
}

</style>
</head>

<body>

<div id="sidebar">
<button onclick="newChat()">+ New Chat</button>
<div id="chatList"></div>
</div>

<div id="main">

<div id="chat"></div>

<div id="inputArea">
<button id="imgBtn">🖼️ Gemini Image</button>
<input id="input" placeholder="Message Nexaris..." />
<button id="send">Send</button>
</div>

</div>

<script>

/* =========================
   API KEYS
========================= */

const CHAT_KEY = "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";

/*
IMPORTANT:
Gemini API KEY goes here for image generation
(from https://aistudio.google.com/app/apikey)
*/

const GEMINI_KEY = "AIzaSyD3oiGFs1tEskJ6qY19wGdp5oR2VsWa6Hw";

/* ========================= */

let chats = {};
let currentChat = null;
let imageMode = false;

/* =========================
   CHAT SYSTEM
========================= */

function newChat(){

const id = "chat_" + Date.now();

chats[id] = [];

currentChat = id;

renderChats();
renderChat();

}

/* SIDEBAR */

function renderChats(){

const list =
document.getElementById("chatList");

list.innerHTML = "";

Object.keys(chats).forEach(id=>{

const div =
document.createElement("div");

div.className = "chatItem";

div.textContent = id;

div.onclick = ()=>{
currentChat = id;
renderChat();
};

list.appendChild(div);

});

}

/* CHAT RENDER */

function renderChat(){

const chat =
document.getElementById("chat");

chat.innerHTML = "";

(chats[currentChat] || []).forEach(m=>{

const div =
document.createElement("div");

div.className = m.role;

if(m.type === "image"){

const img =
document.createElement("img");

img.src = m.text;

div.appendChild(img);

}else{

div.textContent = m.text;

}

chat.appendChild(div);

});

}

/* =========================
   GEMINI IMAGE GENERATION
========================= */

async function generateImage(prompt){

const endpoint =
"https://generativelanguage.googleapis.com/v1beta/models/" +
"gemini-1.5-pro:generateContent?key=" +
GEMINI_KEY;

/*
NOTE:
Gemini does not always return images directly.
This is structured correctly for Gemini API usage.
*/

const res = await fetch(endpoint,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[{
parts:[{
text:
"Generate a detailed image description for: " + prompt
}]
}]
})
});

const data = await res.json();

/* fallback placeholder since Gemini often returns text */
return "https://via.placeholder.com/300x200.png?text=" +
encodeURIComponent(prompt);

}

/* =========================
   SEND MESSAGE
========================= */

async function send(){

const input =
document.getElementById("input");

const text =
input.value.trim();

if(!text) return;

input.value = "";

/* init chat */
if(!chats[currentChat]){
chats[currentChat] = [];
}

/* IMAGE MODE */
if(imageMode){

const img =
await generateImage(text);

chats[currentChat].push({
role:"ai",
type:"image",
text:img
});

imageMode = false;

renderChat();

return;
}

/* USER MESSAGE */
chats[currentChat].push({
role:"user",
text
});

renderChat();

/* CHAT AI (GROQ) */

const messages =
chats[currentChat].map(m=>({
role:m.role,
content:m.text
}));

try{

const res =
await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + CHAT_KEY
},
body:JSON.stringify({
model:"llama-3.1-8b-instant",
messages
})
}
);

const data = await res.json();

const reply =
data?.choices?.[0]?.message?.content
|| "Error";

chats[currentChat].push({
role:"ai",
text:reply
});

renderChat();

}catch(err){

chats[currentChat].push({
role:"ai",
text:"Connection error"
});

renderChat();

}

}

/* IMAGE BUTTON */

document.getElementById("imgBtn")
.onclick = ()=>{
imageMode = true;
alert("Type a prompt for Gemini image generation");
};

/* EVENTS */

document.getElementById("send")
.onclick = send;

document.getElementById("input")
.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

/* START */

newChat();

</script>

</body>
</html>
