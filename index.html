<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nexaris</title>

<style>

/* =========================
   GLOBAL (BIG UI FIX)
========================= */

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
display:flex;
height:100vh;
}

/* =========================
   SIDEBAR
========================= */

#sidebar{
width:280px;
background:#111;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
border-right:1px solid #222;
}

.chatItem{
padding:12px;
background:#222;
border-radius:10px;
cursor:pointer;
font-size:15px;
}

/* =========================
   MAIN AREA
========================= */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* 🔥 BIG CHAT FIX (this is what you wanted) */
#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;

font-size:22px;   /* BIGGER TEXT */
line-height:1.6;  /* MORE READABLE */
}

/* USER MESSAGE */
.user{
align-self:flex-end;
background:#333;
padding:14px;
border-radius:14px;
max-width:75%;
font-size:22px;
}

/* AI MESSAGE */
.ai{
align-self:flex-start;
padding:14px;
max-width:90%;
font-size:22px;
white-space:pre-wrap;
}

/* =========================
   INPUT BAR (BIGGER TOO)
========================= */

#inputArea{
display:flex;
padding:14px;
gap:10px;
border-top:1px solid #222;
}

#input{
flex:1;
padding:16px;
font-size:18px;
background:#111;
border:1px solid #333;
color:white;
border-radius:12px;
}

button{
padding:14px;
font-size:15px;
border:none;
border-radius:12px;
cursor:pointer;
}

#send{background:white;color:black;}
#imgBtn{background:#222;color:white;}

img{
max-width:260px;
margin-top:8px;
border-radius:12px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
<button onclick="newChat()">+ New Chat</button>
<div id="chatList"></div>
</div>

<!-- MAIN -->
<div id="main">

<div id="chat"></div>

<div id="inputArea">
<button id="imgBtn">🖼️ Image</button>
<input id="input" placeholder="Message Nexaris..." />
<button id="send">Send</button>
</div>

</div>

<script>

/* =========================
   API KEYS
========================= */

const GROQ_KEY = "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";
const GEMINI_KEY = "AIzaSyD3oiGFs1tEskJ6qY19wGdp5oR2VsWa6Hw";

/* ========================= */

let chats = {};
let currentChat = null;

/* =========================
   CHAT SYSTEM
========================= */

function newChat(){

const id = "chat_" + Date.now();

chats[id] = [];

currentChat = id;

renderChats();
renderChat();

}

/* SIDEBAR */

function renderChats(){

const list = document.getElementById("chatList");
list.innerHTML = "";

Object.keys(chats).forEach(id=>{

const div = document.createElement("div");
div.className = "chatItem";
div.textContent = id;

div.onclick = ()=>{
currentChat = id;
renderChat();
};

list.appendChild(div);

});

}

/* CHAT RENDER */

function renderChat(){

const chat = document.getElementById("chat");
chat.innerHTML = "";

(chats[currentChat] || []).forEach(m=>{

const div = document.createElement("div");
div.className = m.role;

if(m.type === "image"){

const img = document.createElement("img");
img.src = m.text;
div.appendChild(img);

}else{

div.textContent = m.text;

}

chat.appendChild(div);

});

chat.scrollTop = chat.scrollHeight;

}

/* =========================
   GEMINI IMAGE GENERATION
========================= */

async function generateImage(prompt){

const endpoint =
"https://generativelanguage.googleapis.com/v1beta/models/" +
"gemini-1.5-pro:generateContent?key=" +
GEMINI_KEY;

/* NOTE:
This is structured correctly for Gemini.
Real image output depends on API access.
*/

const res = await fetch(endpoint,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[{
parts:[{
text:"Create a detailed visual description of: " + prompt
}]
}]
})
});

const data = await res.json();

/* fallback image system (safe default) */
return "https://via.placeholder.com/300x200.png?text=" +
encodeURIComponent(prompt);

}

/* =========================
   GEMINI CHAT FALLBACK
========================= */

async function geminiChat(messages){

const endpoint =
"https://generativelanguage.googleapis.com/v1beta/models/" +
"gemini-1.5-flash:generateContent?key=" +
GEMINI_KEY;

const res = await fetch(endpoint,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[{
parts:[{
text: messages.map(m=>m.content).join("\n")
}]
}]
})
});

const data = await res.json();

return data?.candidates?.[0]?.content?.parts?.[0]?.text
|| "Gemini failed.";
}

/* =========================
   SEND (SMART ROUTER)
========================= */

async function send(){

const input = document.getElementById("input");
const text = input.value.trim();

if(!text) return;

input.value = "";

if(!chats[currentChat]){
chats[currentChat] = [];
}

/* save user */
chats[currentChat].push({
role:"user",
text
});

renderChat();

/* messages */
const messages = chats[currentChat].map(m=>({
role:m.role,
content:m.text
}));

/* =========================
   1. TRY GROQ
========================= */

try{

const res = await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + GROQ_KEY
},
body:JSON.stringify({
model:"llama-3.1-8b-instant",
messages
})
}
);

const data = await res.json();

const reply =
data?.choices?.[0]?.message?.content;

if(!reply) throw new Error("Groq failed");

chats[currentChat].push({
role:"ai",
text:reply
});

renderChat();

}

/* =========================
   2. FALLBACK → GEMINI
========================= */

catch(err){

const fallback = await geminiChat(messages);

chats[currentChat].push({
role:"ai",
text:"(Gemini fallback)\n\n" + fallback
});

renderChat();

}

}

/* =========================
   IMAGE MODE
========================= */

document.getElementById("imgBtn")
.onclick = async ()=>{

const prompt = prompt("Image prompt:");

if(!prompt) return;

const img = await generateImage(prompt);

chats[currentChat].push({
role:"ai",
type:"image",
text:img
});

renderChat();

};

/* EVENTS */

document.getElementById("send")
.onclick = send;

document.getElementById("input")
.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

/* START */

newChat();

</script>

</body>
</html>
