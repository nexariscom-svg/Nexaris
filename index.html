<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nexaris</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
#sidebar{
width:280px;
background:#111;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
border-right:1px solid #222;
}

.chatItem{
padding:12px;
background:#222;
border-radius:10px;
cursor:pointer;
font-size:15px;
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

/* BIG CHAT UI */
#chat{
flex:1;
overflow-y:auto;
padding:22px;
display:flex;
flex-direction:column;
gap:16px;

font-size:26px;
line-height:1.7;
}

.user{
align-self:flex-end;
background:#333;
padding:14px;
border-radius:14px;
max-width:75%;
font-size:26px;
}

.ai{
align-self:flex-start;
padding:14px;
max-width:92%;
font-size:26px;
white-space:pre-wrap;
}

/* INPUT */
#inputArea{
display:flex;
padding:14px;
gap:10px;
border-top:1px solid #222;
}

#input{
flex:1;
padding:16px;
font-size:18px;
background:#111;
border:1px solid #333;
color:white;
border-radius:12px;
}

button{
padding:14px;
font-size:15px;
border:none;
border-radius:12px;
cursor:pointer;
}

#send{
background:white;
color:black;
}

</style>
</head>

<body>

<div id="sidebar">
<button onclick="newChat()">+ New Chat</button>
<div id="chatList"></div>
</div>

<div id="main">

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Message Nexaris..." />
<button id="send">Send</button>
</div>

</div>

<script>

/* =========================
   API KEYS
========================= */

const GEMINI_KEY = "AIzaSyD3oiGFs1tEskJ6qY19wGdp5oR2VsWa6Hw";
const GROQ_KEY = "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";

/* ========================= */

let chats = {};
let currentChat = null;

/* =========================
   CHAT SYSTEM
========================= */

function newChat(){

const id = "chat_" + Date.now();

chats[id] = [];

currentChat = id;

renderChats();
renderChat();

}

/* SIDEBAR */

function renderChats(){

const list = document.getElementById("chatList");
list.innerHTML = "";

Object.keys(chats).forEach(id=>{

const div = document.createElement("div");
div.className = "chatItem";
div.textContent = id;

div.onclick = ()=>{
currentChat = id;
renderChat();
};

list.appendChild(div);

});

}

/* CHAT RENDER */

function renderChat(){

const chat = document.getElementById("chat");
chat.innerHTML = "";

(chats[currentChat] || []).forEach(m=>{

const div = document.createElement("div");
div.className = m.role;
div.textContent = m.text;

chat.appendChild(div);

});

chat.scrollTop = chat.scrollHeight;

}

/* =========================
   GEMINI (PRIMARY AI)
========================= */

async function geminiChat(messages){

const endpoint =
"https://generativelanguage.googleapis.com/v1beta/models/" +
"gemini-1.5-flash:generateContent?key=" +
GEMINI_KEY;

const res = await fetch(endpoint,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[{
parts:[{
text: messages.map(m=>m.content).join("\n")
}]
}]
})
});

const data = await res.json();

return data?.candidates?.[0]?.content?.parts?.[0]?.text
|| null;

}

/* =========================
   GROQ (FALLBACK)
========================= */

async function groqChat(messages){

const res = await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + GROQ_KEY
},
body:JSON.stringify({
model:"llama-3.1-8b-instant",
messages
})
}
);

const data = await res.json();

return data?.choices?.[0]?.message?.content
|| null;

}

/* =========================
   SEND (GEMINI FIRST)
========================= */

async function send(){

const input = document.getElementById("input");
const text = input.value.trim();

if(!text) return;

input.value = "";

if(!chats[currentChat]){
chats[currentChat] = [];
}

chats[currentChat].push({
role:"user",
text
});

renderChat();

const messages = chats[currentChat].map(m=>({
role:m.role,
content:m.text
}));

/* =========================
   1. TRY GEMINI FIRST
========================= */

let reply = await geminiChat(messages);

/* =========================
   2. IF GEMINI FAILS → GROQ
========================= */

if(!reply){

reply = await groqChat(messages);

}

/* =========================
   FINAL OUTPUT
========================= */

chats[currentChat].push({
role:"ai",
text: reply || "Both AI systems failed."
});

renderChat();

}

/* EVENTS */

document.getElementById("send")
.onclick = send;

document.getElementById("input")
.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

/* START */

newChat();

</script>

</body>
</html>
