<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nexaris Gemini</title>

<style>

/* =========================
   HUGE UI
========================= */

body{
margin:0;
background:#000;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
}

/* CHAT */

#chat{
flex:1;
overflow-y:auto;
padding:24px;
display:flex;
flex-direction:column;
gap:18px;

font-size:30px;
line-height:1.7;
}

/* USER */

.user{
align-self:flex-end;
background:#333;
padding:18px;
border-radius:18px;
max-width:75%;
font-size:30px;
}

/* AI */

.ai{
align-self:flex-start;
background:#111;
padding:18px;
border-radius:18px;
max-width:92%;
font-size:30px;
white-space:pre-wrap;
}

/* INPUT */

#inputArea{
display:flex;
gap:12px;
padding:18px;
border-top:1px solid #222;
}

#input{
flex:1;
padding:20px;
font-size:24px;
background:#111;
color:white;
border:1px solid #333;
border-radius:16px;
}

button{
padding:20px;
font-size:22px;
border:none;
border-radius:16px;
cursor:pointer;
background:white;
color:black;
}

</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Message Nexaris..." />
<button onclick="send()">Send</button>
</div>

<script>

/* =========================
   GEMINI API KEY
========================= */

const GEMINI_KEY = "AIzaSyCHuE6QMeLm6UE0JS0ywWimH60yC18vqzw";

/* ========================= */

const chat =
document.getElementById("chat");

/* =========================
   ADD MESSAGE
========================= */

function addMsg(role,text){

const div =
document.createElement("div");

div.className = role;
div.textContent = text;

chat.appendChild(div);

chat.scrollTop =
chat.scrollHeight;

}

/* =========================
   GEMINI CHAT
========================= */

async function geminiChat(prompt){

try{

const endpoint =
"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" +
GEMINI_KEY;

const res = await fetch(endpoint,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text: prompt
}
]
}
]
})
});

const data = await res.json();

console.log(data);

/* API ERROR */

if(data.error){

return {
success:false,
reason:
"❌ Gemini API Error\n\n" +
data.error.message
};

}

/* SUCCESS */

const text =
data?.candidates?.[0]?.content?.parts?.[0]?.text;

if(!text){

return {
success:false,
reason:
"❌ Gemini returned empty response."
};

}

return {
success:true,
text
};

}catch(err){

return {
success:false,
reason:
"❌ Gemini crashed\n\n" + err
};

}

}

/* =========================
   SEND
========================= */

async function send(){

const input =
document.getElementById("input");

const text =
input.value.trim();

if(!text) return;

input.value = "";

addMsg("user",text);

addMsg(
"ai",
"🧠 Gemini thinking..."
);

const result =
await geminiChat(text);

/* remove thinking msg */
chat.lastChild.remove();

/* SUCCESS */

if(result.success){

addMsg(
"ai",
result.text
);

return;

}

/* FAILURE */

addMsg(
"ai",
result.reason
);

}

/* ENTER KEY */

document.getElementById("input")
.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){
send();
}

});

</script>

</body>
</html>
