<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nexaris Smart Debug</title>

<style>

/* =========================
   BIG UI
========================= */

body{
margin:0;
background:#000;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:24px;
display:flex;
flex-direction:column;
gap:18px;

font-size:30px; /* HUGE TEXT */
line-height:1.7;
}

/* USER */

.user{
align-self:flex-end;
background:#333;
padding:18px;
border-radius:16px;
max-width:75%;
font-size:30px;
}

/* AI */

.ai{
align-self:flex-start;
background:#111;
padding:18px;
border-radius:16px;
max-width:92%;
font-size:30px;
white-space:pre-wrap;
}

/* INPUT */

#inputArea{
display:flex;
gap:12px;
padding:16px;
border-top:1px solid #222;
}

#input{
flex:1;
padding:18px;
font-size:24px;
background:#111;
color:white;
border:1px solid #333;
border-radius:14px;
}

button{
padding:18px;
font-size:22px;
border:none;
border-radius:14px;
cursor:pointer;
background:white;
color:black;
}

</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Message Nexaris..." />
<button onclick="send()">Send</button>
</div>

<script>

/* =========================
   API KEYS
========================= */

const GEMINI_KEY = "AIzaSyD3oiGFs1tEskJ6qY19wGdp5oR2VsWa6Hw";
const GROQ_KEY = "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";

/* ========================= */

const chat =
document.getElementById("chat");

/* =========================
   UI MESSAGE
========================= */

function addMsg(role,text){

const div =
document.createElement("div");

div.className = role;
div.textContent = text;

chat.appendChild(div);

chat.scrollTop =
chat.scrollHeight;

}

/* =========================
   GEMINI TEST
========================= */

async function geminiChat(prompt){

try{

const endpoint =
"https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" +
GEMINI_KEY;

const res = await fetch(endpoint,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[{
parts:[{
text: prompt
}]
}]
})
});

const data = await res.json();

/* DEBUG ERRORS */

if(data.error){

return {
success:false,
reason:
"Gemini Error:\n\n" +
(data.error.message || "Unknown Gemini issue")
};

}

/* SUCCESS */

const text =
data?.candidates?.[0]?.content?.parts?.[0]?.text;

if(!text){

return {
success:false,
reason:
"Gemini returned an empty response."
};

}

return {
success:true,
text
};

}catch(err){

return {
success:false,
reason:
"Gemini crashed:\n\n" + err
};

}

}

/* =========================
   GROQ TEST
========================= */

async function groqChat(prompt){

try{

const res = await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + GROQ_KEY
},
body:JSON.stringify({
model:"llama-3.1-8b-instant",
messages:[
{
role:"user",
content:prompt
}
]
})
}
);

const data = await res.json();

/* DEBUG ERRORS */

if(data.error){

return {
success:false,
reason:
"Groq Error:\n\n" +
(data.error.message || "Unknown Groq issue")
};

}

/* SUCCESS */

const text =
data?.choices?.[0]?.message?.content;

if(!text){

return {
success:false,
reason:
"Groq returned an empty response."
};

}

return {
success:true,
text
};

}catch(err){

return {
success:false,
reason:
"Groq crashed:\n\n" + err
};

}

}

/* =========================
   SEND
========================= */

async function send(){

const input =
document.getElementById("input");

const text =
input.value.trim();

if(!text) return;

input.value = "";

addMsg("user",text);

/* =========================
   TRY GEMINI FIRST
========================= */

addMsg("ai","Testing Gemini...");

const gemini =
await geminiChat(text);

/* SUCCESS */

if(gemini.success){

chat.lastChild.remove();

addMsg(
"ai",
"🧠 Gemini Success:\n\n" +
gemini.text
);

return;

}

/* FAILURE */

chat.lastChild.remove();

addMsg(
"ai",
gemini.reason
);

/* =========================
   TRY GROQ
========================= */

addMsg(
"ai",
"Gemini failed.\n\nTrying Groq..."
);

const groq =
await groqChat(text);

/* SUCCESS */

if(groq.success){

chat.lastChild.remove();

addMsg(
"ai",
"⚡ Groq Success:\n\n" +
groq.text
);

return;

}

/* FAILURE */

chat.lastChild.remove();

addMsg(
"ai",
groq.reason
);

addMsg(
"ai",
"❌ BOTH APIS FAILED"
);

}

</script>

</body>
</html>
