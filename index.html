<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nexaris Fixed UI</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
font-family:Arial;
overflow:hidden;
}

/* APP */
#app{
display:flex;
width:100vw;
height:100vh;
}

/* SIDEBAR */
#sidebar{
width:240px;
background:#111;
display:flex;
flex-direction:column;
padding:10px;
gap:8px;
border-right:1px solid #222;
overflow-y:auto;
}

#mode{
padding:10px;
background:#222;
border-radius:8px;
text-align:center;
cursor:pointer;
color:white;
font-size:14px;
}

button{
padding:10px;
font-size:14px;
border:none;
border-radius:8px;
cursor:pointer;
background:white;
color:black;
}

.chatItem{
padding:10px;
background:#222;
border-radius:8px;
cursor:pointer;
font-size:14px;
color:white;
}

/* PERSONALIZATION */
.sectionTitle{
margin-top:6px;
font-size:12px;
color:#aaa;
}

textarea{
width:100%;
height:110px;
background:#222;
color:white;
border:none;
border-radius:8px;
padding:8px;
font-size:12px;
resize:none;
outline:none;
}

/* MAIN AREA FIX */
#main{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

/* CHAT (TAKES ALL AVAILABLE SPACE) */
#chat{
flex:1;
min-height:0;
overflow-y:auto;
padding:18px;
display:flex;
flex-direction:column;
gap:12px;
font-size:22px;
line-height:1.5;
}

/* CLEAN TEXT ONLY */
.user{
align-self:flex-end;
color:white;
max-width:80%;
}

.ai{
align-self:flex-start;
color:#eaeaea;
max-width:95%;
white-space:pre-wrap;
}

/* INPUT BAR (ALWAYS VISIBLE FIX) */
#inputArea{
flex-shrink:0;
display:flex;
gap:8px;
padding:10px;
border-top:1px solid #222;
align-items:center;
background:#000;
}

#input{
flex:1;
padding:12px;
font-size:16px;
background:#111;
color:white;
border:1px solid #333;
border-radius:8px;
outline:none;
}

img{
max-width:260px;
border-radius:10px;
margin-top:6px;
}

#imgInput{
display:none;
}

</style>
</head>

<body>

<div id="app">

<!-- SIDEBAR -->
<div id="sidebar">

<div id="mode" onclick="toggleMode()">Friend Mode 💖</div>

<button onclick="newChat()">+ New Chat</button>

<div id="chatList"></div>

<div class="sectionTitle">Personalization 🧠</div>

<textarea id="personaBox"
placeholder="Be friendly, use emojis, talk naturally..."></textarea>

</div>

<!-- MAIN -->
<div id="main">

<div id="chat"></div>

<div id="inputArea">

<button onclick="document.getElementById('imgInput').click()">📷</button>

<input id="input" placeholder="Message Nexaris..." />

<button onclick="send()">Send</button>

<input type="file" id="imgInput" accept="image/*">

</div>

</div>

</div>

<script>

/* KEYS */
const OPENROUTER_KEY="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";
const GROQ_KEY="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";

let chats={};
let currentChat=null;
let mode="friend";

/* MODE */
function toggleMode(){
mode=mode==="friend"?"smart":mode==="smart"?"fast":"friend";
document.getElementById("mode").innerText=
mode==="friend"?"Friend Mode 💖":
mode==="smart"?"Smart Mode 🧠":
"Fast Mode ⚡";
}

/* NEW CHAT */
function newChat(){
const id="Chat "+(Object.keys(chats).length+1);
chats[id]=[];
currentChat=id;
renderChats();
renderChat();
}

/* RENDER CHAT LIST */
function renderChats(){
const list=document.getElementById("chatList");
list.innerHTML="";
Object.keys(chats).forEach(id=>{
const d=document.createElement("div");
d.className="chatItem";
d.textContent=id;
d.onclick=()=>{currentChat=id;renderChat();};
list.appendChild(d);
});
}

/* PERSONA */
function getPersona(){
return document.getElementById("personaBox").value||"";
}

/* PROMPT */
function buildPrompt(messages){

let system=
"Be a friendly assistant 🙂✨. Use emojis naturally. ";

let persona=getPersona();
if(persona.trim()){
system+="\n\nUser style:\n"+persona;
}

return[
{role:"system",content:system},
...messages
];

}

/* OPENROUTER */
async function openRouterChat(messages){

const model=mode==="fast"
?"mistralai/mistral-7b-instruct:free"
:"deepseek/deepseek-chat-v3-0324:free";

const res=await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+OPENROUTER_KEY
},
body:JSON.stringify({
model,
messages:buildPrompt(messages)
})
}
);

const data=await res.json();
if(data.error)return{success:false,reason:data.error.message};

const text=data?.choices?.[0]?.message?.content;

return text?
{success:true,text}:{success:false};
}

/* GROQ */
async function groqChat(messages){

const res=await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+GROQ_KEY
},
body:JSON.stringify({
model:"llama-3.1-8b-instant",
messages:buildPrompt(messages)
})
}
);

const data=await res.json();

const text=data?.choices?.[0]?.message?.content;

return text?
{success:true,text}:{success:false};
}

/* SEND (FIXED INPUT NEVER DISAPPEARS) */
async function send(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text)return;

input.value="";

if(!currentChat){
newChat();
}

if(!chats[currentChat]){
chats[currentChat]=[];
}

chats[currentChat].push({role:"user",text});

renderChat();

const msgs=chats[currentChat].map(m=>({
role:m.role,
content:m.text
}));

let r=await openRouterChat(msgs);

if(!r.success){
r=await groqChat(msgs);
}

add("ai",r.success?r.text:"❌ FAILED\n\nerror");

}

/* CHAT RENDER */
function renderChat(){

const chat=document.getElementById("chat");
chat.innerHTML="";

if(!chats[currentChat])return;

for(const m of chats[currentChat]){

const d=document.createElement("div");
d.className=m.role;

if(m.type==="image"){
const img=document.createElement("img");
img.src=m.text;
d.appendChild(img);
}else{
d.textContent=m.text;
}

chat.appendChild(d);

}

chat.scrollTop=chat.scrollHeight;

}

/* ADD MESSAGE */
function add(role,text){

const chat=document.getElementById("chat");
const d=document.createElement("div");
d.className=role;
d.textContent=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;

}

/* IMAGE */
document.getElementById("imgInput")
.addEventListener("change",e=>{
const f=e.target.files[0];
if(!f)return;

const r=new FileReader();
r.onload=ev=>{
if(!chats[currentChat])chats[currentChat]=[];
chats[currentChat].push({
role:"user",
type:"image",
text:ev.target.result
});
renderChat();
};
r.readAsDataURL(f);
});

/* ENTER */
document.getElementById("input")
.addEventListener("keydown",e=>{
if(e.key==="Enter")send();
});

/* INIT */
newChat();

</script>

</body>
</html>
