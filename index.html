<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexaris</title>
<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
display:flex;
height:100vh;
}

/* SIDEBAR */
#sidebar{
width:220px;
background:#111;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
border-right:1px solid #222;
}

.chatItem{
padding:8px;
background:#222;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.chatItem:hover{
background:#333;
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.user{
align-self:flex-end;
background:#333;
padding:10px;
border-radius:10px;
max-width:70%;
}

.ai{
align-self:flex-start;
padding:10px;
max-width:90%;
white-space:pre-wrap;
}

#inputArea{
display:flex;
padding:10px;
gap:10px;
border-top:1px solid #222;
}

#input{
flex:1;
padding:10px;
background:#111;
border:1px solid #333;
color:white;
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

#send{background:white;color:black;}
#imgBtn{background:#222;color:white;}

img{
max-width:200px;
border-radius:10px;
margin-top:5px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
<button onclick="newChat()">+ New Chat</button>
<div id="chatList"></div>
</div>

<!-- MAIN -->
<div id="main">

<div id="chat"></div>

<div id="inputArea">
<button id="imgBtn">📷</button>
<input id="input" placeholder="Message Nexaris..." />
<button id="send">Send</button>
</div>

<input type="file" id="file" hidden />

</div>

<script>

/* =========================
   API KEYS
========================= */

const CHAT_KEY = "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";
const IMAGE_KEY = "AIzaSyD3oiGFs1tEskJ6qY19wGdp5oR2VsWa6Hw";

/* ========================= */

let chats = {};
let currentChat = "chat1";

let imageBase64 = null;

/* INIT */

function newChat(){

const id = "chat_" + Date.now();

chats[id] = [];

currentChat = id;

renderChats();
renderMessages();

}

function renderChats(){

const list =
document.getElementById("chatList");

list.innerHTML = "";

Object.keys(chats).forEach(id=>{

const div =
document.createElement("div");

div.className = "chatItem";

div.textContent = id;

div.onclick = ()=>{
currentChat = id;
renderMessages();
};

list.appendChild(div);

});

}

function renderMessages(){

const chat =
document.getElementById("chat");

chat.innerHTML = "";

(chats[currentChat] || []).forEach(m=>{

addMsgUI(m.role, m.text, m.img, false);

});

}

function addMsgUI(role,text,img,save=true){

const chat =
document.getElementById("chat");

const div =
document.createElement("div");

div.className = role;

div.textContent = text || "";

if(img){

const image =
document.createElement("img");

image.src = img;

div.appendChild(image);

}

chat.appendChild(div);

chat.scrollTop = chat.scrollHeight;

if(save){

chats[currentChat].push({
role,text,img
});

}

}

/* IMAGE UPLOAD */

document.getElementById("imgBtn")
.onclick = ()=> file.click();

file.onchange = e=>{

const reader =
new FileReader();

reader.onload = ()=>{

imageBase64 = reader.result;

};

reader.readAsDataURL(e.target.files[0]);

};

/* SEND */

async function send(){

const input =
document.getElementById("input");

const text =
input.value.trim();

if(!text && !imageBase64) return;

input.value = "";

addMsgUI("user",text,imageBase64,true);

const messages =
(chats[currentChat]||[])
.map(m=>({
role:m.role,
content:m.text
}));

messages.push({
role:"user",
content:text
});

/* CHAT API */

try{

const res =
await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + CHAT_KEY
},
body:JSON.stringify({
model:"llama-3.1-8b-instant",
messages
})
}
);

const data = await res.json();

const reply =
data?.choices?.[0]?.message?.content
|| "Error";

addMsgUI("ai",reply,null,true);

}catch(err){

addMsgUI("ai","Error connecting");

}

imageBase64 = null;
file.value = "";

}

/* EVENTS */

document.getElementById("send")
.onclick = send;

document.getElementById("input")
.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

/* START */

newChat();

</script>

</body>
</html>
